<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光譜方法選擇決策樹 — Ch6</title>
<style>
  :root {
    --bg:      #0D1B2A;
    --card:    #1A3050;
    --card2:   #0F2133;
    --blue:    #00C6FF;
    --gold:    #FFD700;
    --green:   #2ECC71;
    --red:     #E74C3C;
    --purple:  #9B59B6;
    --orange:  #E67E22;
    --teal:    #1ABC9C;
    --text:    #ECEEF2;
    --muted:   #7A91B0;
    --dim:     #2A4A6A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 頂部 ── */
  header {
    background: rgba(10,20,35,0.95);
    border-bottom: 1px solid var(--dim);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 20px; color: var(--blue); }
  header .tag {
    font-size: 12px; color: var(--muted);
    background: var(--card); padding: 4px 12px; border-radius: 20px;
  }
  #resetBtn {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--muted);
    padding: 6px 16px; border-radius: 8px;
    font-size: 13px; cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  #resetBtn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── 麵包屑 ── */
  #breadcrumb {
    padding: 12px 32px;
    font-size: 13px;
    color: var(--muted);
    min-height: 40px;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .bc-item { color: var(--muted); }
  .bc-arrow { color: var(--dim); }
  .bc-current { color: var(--gold); }

  /* ── 主區域 ── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 32px 48px;
  }

  /* ── 問題節點 ── */
  .node { width: 100%; max-width: 820px; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-size: 12px; color: var(--blue); font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .question-card {
    background: var(--card);
    border-radius: 20px;
    padding: 32px 36px;
    margin-bottom: 24px;
    border-top: 4px solid var(--blue);
  }
  .question-card h2 {
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .question-card p {
    font-size: 14px; color: var(--muted); line-height: 1.6;
  }

  /* ── 選項按鈕 ── */
  .choices { display: flex; flex-direction: column; gap: 12px; }
  .choice-btn {
    background: var(--card2);
    border: 2px solid var(--dim);
    border-radius: 14px;
    padding: 18px 24px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .choice-btn:hover {
    border-color: var(--blue);
    background: #162840;
    transform: translateX(4px);
  }
  .choice-icon {
    font-size: 28px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .choice-text h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .choice-text p  { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* ── 結果卡 ── */
  .result-card {
    border-radius: 20px;
    padding: 36px;
    animation: fadeIn 0.4s ease;
  }
  .result-badge {
    display: inline-block;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 16px;
    color: #0D1B2A;
  }
  .result-card h2 {
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .result-card .en {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }
  @media (max-width: 560px) { .result-grid { grid-template-columns: 1fr; } }
  .result-item {
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .result-item .ri-label {
    font-size: 11px; color: var(--muted);
    font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .result-item .ri-val { font-size: 15px; color: var(--text); line-height: 1.4; }

  .food-case {
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    border-left: 4px solid;
  }
  .food-case h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .food-case p  { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .result-btns { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--blue);
    color: #0D1B2A;
    border: none;
    padding: 13px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--dim);
    color: var(--muted);
    padding: 13px 28px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); }

  /* ── 底部進度 ── */
  footer {
    padding: 12px 32px;
    display: flex;
    gap: 6px;
    justify-content: center;
    border-top: 1px solid var(--dim);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
  }
  .dot.active { background: var(--blue); }
  .dot.visited { background: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>🔬 光譜方法選擇</h1>
  <span class="tag">Ch6 食品分析決策樹</span>
  <button id="resetBtn">重新開始</button>
</header>

<div id="breadcrumb"></div>

<main>
  <div class="node" id="nodeArea"></div>
</main>

<footer>
  <div class="dot active" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>

let currentId = 'root';

function render(nodeId) {
  const node = TREE[nodeId];
  const area = document.getElementById('nodeArea');
  area.innerHTML = '';

  updateBreadcrumb();
  updateDots();

  if (node.type === 'result') {
    renderResult(node, area);
  } else {
    renderQuestion(node, area);
  }
}

// ── 問題節點 ──
function renderQuestion(node, area) {
  const div = document.createElement('div');
  div.className = 'node';
  div.innerHTML = `
    <div class="step-label">${node.step}</div>
    <div class="question-card">
      <h2>${node.q}</h2>
      ${node.hint ? `<p>${node.hint}</p>` : ''}
    </div>
    <div class="choices">
      ${node.choices.map((c, i) => `
        <button class="choice-btn" data-next="${c.next}">
          <span class="choice-icon">${c.icon}</span>
          <div class="choice-text">
            <h3>${c.text}</h3>
            <p>${c.desc}</p>
          </div>
        </button>
      `).join('')}
    </div>
  `;
  area.appendChild(div);

  div.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const next = btn.dataset.next;
      history.push(next);
      currentId = next;
      render(next);
    });
  });
}

// ── 結果節點 ──
function renderResult(node, area) {
  const div = document.createElement('div');
  div.className = 'node';

  div.innerHTML = `
    <div class="result-card" style="background: linear-gradient(135deg, ${node.color}18, #1A3050); border-top: 4px solid ${node.color};">
      <div class="result-badge" style="background: ${node.color};">推薦方法</div>
      <h2 style="color: ${node.color};">${node.name}</h2>
      <div class="en">${node.en}</div>

      <div class="result-grid">
        ${node.items.map(it => `
          <div class="result-item">
            <div class="ri-label">${it.label}</div>
            <div class="ri-val">${it.val}</div>
          </div>
        `).join('')}
      </div>

      <div class="food-case" style="background: ${node.case.bg}; border-left-color: ${node.color};">
        <h4>食品案例 ${node.case.title}</h4>
        <p>${node.case.desc}</p>
      </div>

      <div style="background: rgba(255,215,0,0.08); border-radius: 12px; padding: 14px 18px; margin-bottom: 24px; border-left: 3px solid #FFD700;">
        <p style="font-size: 14px; color: #FFD700; line-height: 1.6;">${node.predict}</p>
      </div>

      <div id="submit-form" style="background:rgba(0,198,255,0.06);border-radius:12px;padding:16px 18px;margin-bottom:20px;border:1px solid rgba(0,198,255,0.25)">
        <p style="font-size:14px;color:#00C6FF;font-weight:700;margin-bottom:10px">📝 記錄你的選擇（老師即時看到 · 計入參與紀錄）</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <div>
            <label style="font-size:11px;color:#7A91B0;font-weight:700;letter-spacing:1px;display:block;margin-bottom:4px">學號 *</label>
            <input type="text" id="student-id" placeholder="例：S11234567" maxlength="12" autocomplete="off"
              style="width:100%;background:#0F2133;border:1px solid #2A4A6A;border-radius:8px;color:#ECEEF2;font-family:inherit;font-size:15px;padding:9px 12px;outline:none">
          </div>
          <div>
            <label style="font-size:11px;color:#7A91B0;font-weight:700;letter-spacing:1px;display:block;margin-bottom:4px">姓名（選填）</label>
            <input type="text" id="student-name" placeholder="例：王小明" maxlength="10" autocomplete="off"
              style="width:100%;background:#0F2133;border:1px solid #2A4A6A;border-radius:8px;color:#ECEEF2;font-family:inherit;font-size:15px;padding:9px 12px;outline:none">
          </div>
        </div>
        <textarea id="reason-text" placeholder="你為什麼選擇這個方法？（選填）"
          style="width:100%;min-height:68px;background:#0F2133;border:1px solid #2A4A6A;border-radius:8px;color:#ECEEF2;font-family:inherit;font-size:14px;padding:10px;resize:vertical"></textarea>
        <div style="display:flex;gap:10px;margin-top:10px;align-items:center">
          <button id="submitBtn" style="padding:8px 22px;background:#00C6FF;color:#0D1B2A;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px">送出 ✓</button>
          <span id="submit-status" style="font-size:13px;color:#7A91B0"></span>
        </div>
      </div>

      <div class="result-btns">
        <button class="btn-primary" id="restartBtn">重新選擇</button>
        <button class="btn-outline" id="backBtn">← 上一步</button>
      </div>
    </div>
  `;
  area.appendChild(div);

  div.querySelector('#restartBtn').addEventListener('click', resetTree);
  div.querySelector('#backBtn').addEventListener('click', goBack);

  // Wire submit button (Firebase module will handle the actual send)
  const submitBtn = div.querySelector('#submitBtn');
  if (submitBtn) {
    submitBtn.addEventListener('click', () => {
      const studentId   = div.querySelector('#student-id').value.trim();
      const studentName = div.querySelector('#student-name').value.trim();
      const reason      = div.querySelector('#reason-text').value.trim();
      const statusEl    = div.querySelector('#submit-status');
      if (!studentId) {
        statusEl.textContent = '⚠️ 請先輸入學號';
        statusEl.style.color = '#E74C3C';
        div.querySelector('#student-id').focus();
        return;
      }
      window._dtSubmit && window._dtSubmit(node.name, reason, studentId, studentName, statusEl, submitBtn);
    });
  }
}

// ── 麵包屑 ──
const LABELS = {
  root:       "分析目的",
  q_quant:    "定量",
  q_qual:     "鑑別結構",
  q_screen:   "快篩",
  q_twoStep:  "兩段式確認",
  r_aas:      "→ AAS",
  r_uvvis:    "→ UV-Vis",
  r_fluo:     "→ 螢光",
  r_nmr:      "→ NMR",
  r_ir:       "→ FTIR",
  r_raman:    "→ Raman",
  r_ftir:     "→ FTIR 現場",
  r_lcms:     "→ LC-MS",
};

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = history.map((id, i) => {
    const label = LABELS[id] || id;
    if (i === history.length - 1) {
      return `<span class="bc-current">${label}</span>`;
    }
    return `<span class="bc-item">${label}</span><span class="bc-arrow">›</span>`;
  }).join('');
}

function updateDots() {
  const depth = Math.min(history.length - 1, 3);
  [0,1,2,3].forEach(i => {
    const d = document.getElementById('d' + i);
    d.className = 'dot' + (i < depth ? ' visited' : '') + (i === depth ? ' active' : '');
  });
}

// ── 返回 ──
function goBack() {
  if (history.length <= 1) return;
  history.pop();
  currentId = history[history.length - 1];
  render(currentId);
}

// ── 重置 ──
function resetTree() {
  history = ['root'];
  currentId = 'root';
  render('root');
}

// ── 初始化 ──
document.getElementById('resetBtn').addEventListener('click', resetTree);
render('root');
</script>

<script type="module">
import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Firebase 設定從 Hosting 保留端點取得，API Key 不寫死在原始碼 ────
// /__/firebase/init.json 只有 Firebase Hosting 會回應；
// 本機 file:// 或其他伺服器開啟時 db = undefined，即時功能靜默停用。
let db;
try {
  const _r = await fetch('/__/firebase/init.json');
  if (!_r.ok) throw new Error('not Firebase Hosting');
  const FB = await _r.json();
  db = getFirestore(initializeApp(FB));
} catch (_e) {
  console.warn('[Firebase] 即時功能停用（請由 Firebase Hosting 開啟）', _e.message);
}

// Session from URL param or today's date
const params  = new URLSearchParams(location.search);
const SESSION = params.get('session') || new Date().toISOString().slice(0,10).replace(/-/g,'');

window._dtSubmit = async function(method, reason, studentId, studentName, statusEl, btn) {
  if (btn._submitted) return;
  if (!studentId) { if (statusEl) { statusEl.textContent = '⚠️ 請先輸入學號'; statusEl.style.color = '#E74C3C'; } return; }
  btn._submitted = true;
  btn.disabled = true;
  btn.textContent = '送出中…';
  if (statusEl) statusEl.textContent = '';
  try {
    await addDoc(collection(db, 'decision_tree_responses', SESSION, 'responses'), {
      method,
      reason:     reason      || '',
      student_id: studentId,
      name:       studentName || '',
      ts: serverTimestamp()
    });
    btn.textContent = '✓ 已送出';
    btn.style.background = '#2ECC71';
    if (statusEl) { statusEl.textContent = `✓ ${studentId} 已記錄`; statusEl.style.color = '#2ECC71'; }
  } catch(e) {
    btn.disabled = false;
    btn._submitted = false;
    btn.textContent = '送出 ✓';
    if (statusEl) { statusEl.textContent = '送出失敗，請確認網路後重試'; statusEl.style.color = '#E74C3C'; }
    console.error(e);
  }
};
</script>
</body>
