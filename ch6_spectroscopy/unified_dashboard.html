<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多課程教師即時儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0D1B2A; --card:#1A3050; --card2:#122540;
  --pri:#00C6FF; --hi:#FFD700; --txt:#ECEEF2; --muted:#7A91B0;
  --grn:#2ECC71; --red:#E74C3C; --pur:#9B59B6; --org:#E67E22;
}
body {
  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  padding: 16px;
  font-size: 15px;
}
.container { max-width: 1320px; margin: 0 auto; }
header.top {
  background: linear-gradient(135deg, var(--card) 0%, #2A4A6E 100%);
  color: var(--txt);
  padding: 22px 26px;
  border-radius: 14px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  border-left: 4px solid var(--pri);
}
header.top h1 { font-size: 22px; margin-bottom: 4px; color: var(--pri); }
header.top .meta { font-size: 13px; color: var(--muted); }

.btn {
  background: var(--pri);
  color: var(--bg);
  border: none;
  padding: 10px 22px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  min-height: 44px;
}
.btn:hover { background: #00A0CC; }
.btn-secondary { background: #5B6777; color: var(--txt); }
.btn-secondary:hover { background: #455260; }

.login-card {
  background: var(--card);
  border-radius: 14px;
  padding: 40px 32px;
  text-align: center;
  max-width: 480px;
  margin: 60px auto;
  border-left: 4px solid var(--pri);
}
.login-card h2 { font-size: 22px; margin-bottom: 12px; color: var(--pri); }
.login-card p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

.filter-bar {
  background: var(--card);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar label {
  font-size: 13px;
  color: var(--muted);
  margin-right: 4px;
}
.filter-bar select {
  background: var(--card2);
  color: var(--txt);
  border: 1px solid #2A4A6E;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.filter-bar select:focus { outline: none; border-color: var(--pri); }
.filter-bar .live-tag {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.live-dot {
  width: 8px; height: 8px; background: var(--grn);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.kpi {
  background: var(--card);
  border-radius: 12px;
  padding: 20px 16px;
  text-align: center;
  border-left: 3px solid var(--pri);
}
.kpi .num {
  font-size: 38px;
  font-weight: bold;
  color: var(--hi);
  line-height: 1.1;
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
}
.kpi .label { font-size: 13px; color: var(--muted); }

.row {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 900px) { .row { grid-template-columns: 1fr; } }

.panel {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
}
.panel h3 {
  font-size: 16px;
  margin-bottom: 14px;
  color: var(--pri);
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-empty { color: var(--muted); font-size: 13px; padding: 12px 0; text-align: center; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td {
  padding: 9px 10px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
th {
  background: var(--card2);
  color: var(--pri);
  font-weight: bold;
  font-size: 12px;
}
.cell-done { background: rgba(46, 204, 113, 0.15); color: var(--grn); font-weight: bold; }
.cell-partial { background: rgba(255, 215, 0, 0.12); color: var(--hi); }
.cell-empty { color: #2A4A6E; }
.cell-sid { font-weight: bold; color: var(--txt); text-align: left; }

.bar-row {
  display: grid;
  grid-template-columns: 130px 1fr 56px;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
}
.bar-row .term { color: var(--txt); font-size: 12.5px; word-break: break-all; }
.bar-row .bar {
  height: 22px;
  background: rgba(231, 76, 60, 0.15);
  border-radius: 4px;
  overflow: hidden;
}
.bar-row .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), #C8553D);
  border-radius: 4px;
  transition: width 0.4s;
}
.bar-row .count {
  text-align: right;
  color: var(--red);
  font-weight: bold;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}

.feed { max-height: 380px; overflow-y: auto; }
.feed::-webkit-scrollbar { width: 6px; }
.feed::-webkit-scrollbar-thumb { background: #2A4A6E; border-radius: 3px; }
.feed-item {
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.feed-item:hover { background: var(--card2); }
.feed-item .time {
  color: var(--muted);
  flex-shrink: 0;
  min-width: 64px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.feed-item .who {
  font-weight: bold;
  color: var(--txt);
  min-width: 88px;
  background: var(--card2);
  padding: 2px 8px;
  border-radius: 4px;
  text-align: center;
  flex-shrink: 0;
  font-size: 12px;
}
.feed-item .what { flex: 1; min-width: 0; }
.tag { padding: 2px 7px; border-radius: 4px; font-size: 10.5px; font-weight: bold; margin-right: 4px; }
.tag-correct { background: rgba(46, 204, 113, 0.2); color: var(--grn); }
.tag-wrong { background: rgba(231, 76, 60, 0.2); color: var(--red); }
.tag-complete { background: rgba(0, 198, 255, 0.2); color: var(--pri); }

.toolbar {
  text-align: right;
  margin-top: 16px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.error-msg {
  background: rgba(231, 76, 60, 0.15);
  color: var(--red);
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.5;
  border-left: 3px solid var(--red);
}

.course-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: bold;
  font-family: 'JetBrains Mono', monospace;
}
.course-badge.fa4y { background: var(--pri); color: var(--bg); }
.course-badge.fa5z { background: var(--grn); color: var(--bg); }
.course-badge.fc { background: var(--org); color: var(--bg); }
.course-badge.glp1 { background: var(--pur); color: var(--txt); }
.course-badge.vn { background: var(--hi); color: var(--bg); }
</style>
</head>
<body>
<div class="container">
  <header class="top">
    <div>
      <h1>📊 多課程教師即時儀表板</h1>
      <div class="meta">統一收集 student_events ｜ <span id="userEmail">未登入</span></div>
    </div>
    <div>
      <a href="index.html" style="color: var(--pri); text-decoration:none; font-size: 13px;">← 教師入口</a>
    </div>
  </header>

  <div id="loginPanel" class="login-card">
    <h2>👩‍🏫 老師，請登入</h2>
    <p>用 Google 帳號（限 <strong style="color:var(--hi)">tsyeh0909@gmail.com</strong>）登入後可查看跨課程即時資料。</p>
    <button class="btn" id="signInBtn">用 Google 登入</button>
    <div id="loginError" class="error-msg" style="display:none; margin-top: 16px;"></div>
  </div>

  <div id="dashboard" hidden>
    <div class="filter-bar">
      <div>
        <label>課程</label>
        <select id="courseFilter">
          <option value="">全部課程</option>
          <option value="4y_food_analysis">四技食品分析</option>
          <option value="5z_food_analysis">五專食品分析</option>
          <option value="4y_food_chem">四技食品化學</option>
          <option value="vn_chinese">越南班華語文（食品營養）</option>
        </select>
      </div>
      <div>
        <label>班級</label>
        <select id="classFilter">
          <option value="">全部班級</option>
          <option value="A">A 班</option>
          <option value="B">B 班</option>
        </select>
      </div>
      <div>
        <label>章節</label>
        <select id="chapterFilter">
          <option value="">全部章節</option>
        </select>
      </div>
      <div>
        <label>日期</label>
        <select id="dateFilter">
          <option value="">全部日期</option>
          <option value="today">今天</option>
          <option value="3d">最近 3 天</option>
          <option value="7d">最近 7 天</option>
        </select>
      </div>
      <div class="live-tag"><span class="live-dot"></span> 即時更新中</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="num" id="kpiStudents">0</div><div class="label">登入學生</div></div>
      <div class="kpi"><div class="num" id="kpiAnswers">0</div><div class="label">答題總數</div></div>
      <div class="kpi"><div class="num" id="kpiCompletes">0</div><div class="label">遊戲完成次數</div></div>
      <div class="kpi"><div class="num" id="kpiAccuracy">—</div><div class="label">整體正確率</div></div>
    </div>

    <div class="row">
      <section class="panel">
        <h3>🎯 學生 × 遊戲 完成度</h3>
        <div style="overflow-x: auto;">
          <table id="completionTable">
            <thead>
              <tr id="completionHeader">
                <th>學號</th>
                <th>課程</th>
              </tr>
            </thead>
            <tbody id="completionBody"></tbody>
          </table>
        </div>
      </section>
      <section class="panel">
        <h3>📚 錯誤題排行（前 10 高）</h3>
        <div id="errorRank"><div class="panel-empty">尚無資料</div></div>
      </section>
    </div>

    <section class="panel">
      <h3><span class="live-dot"></span> 即時動態（最近 30 筆）</h3>
      <div class="feed" id="liveFeed"><div class="panel-empty">等待學生開始作答…</div></div>
    </section>

    <div class="toolbar">
      <button class="btn" id="exportBtn">📥 匯出 CSV</button>
      <button class="btn btn-secondary" id="logoutBtn">登出</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import {
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged,
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';
import {
  getFirestore, collection, onSnapshot,
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

// Firebase config: Hosting auto-load
let FB_CONFIG = null;
try {
  const r = await fetch('/__/firebase/init.json');
  if (r.ok) FB_CONFIG = await r.json();
} catch (e) { /* fallback below */ }
if (!FB_CONFIG) {
  FB_CONFIG = {
    apiKey: 'FIREBASE_API_KEY_REMOVED',
    authDomain: 'my-teaching-tools-517a0.firebaseapp.com',
    projectId: 'my-teaching-tools-517a0',
    storageBucket: 'my-teaching-tools-517a0.firebasestorage.app',
    messagingSenderId: '244288457011',
    appId: '1:244288457011:web:4b3ff8a846a6c50b169646',
  };
}

const TEACHER_EMAIL = 'tsyeh0909@gmail.com';
const COLLECTION_NAME = 'student_events';

const COURSE_NAMES = {
  '4y_food_analysis': '4技食分',
  '5z_food_analysis': '5專食分',
  '4y_food_chem': '4技食化',
  'glp1_chinese': '越南華語(舊)',  // 歷史資料，已合併進 vn_chinese
  'vn_chinese': '越南華語',
};
const COURSE_BADGE_CLS = {
  '4y_food_analysis': 'fa4y',
  '5z_food_analysis': 'fa5z',
  '4y_food_chem': 'fc',
  'glp1_chinese': 'vn',
  'vn_chinese': 'vn',
};
const GAME_NAMES = {
  'vocab-match': '詞配對',
  'mcq': '選擇題',
  'sort': '排序',
  'scenario-fill': '情境填空',
  // GLP-1 舊命名
  'data-mcq': '數據判讀',
  'industry-sort': '產業分類',
  'pattern-fill': '句型填空',
};

const app = initializeApp(FB_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);

let unsubscribe = null;
let allEvents = [];

document.getElementById('signInBtn').onclick = async () => {
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ login_hint: TEACHER_EMAIL });
  const errBox = document.getElementById('loginError');
  errBox.style.display = 'none';
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    errBox.textContent = '登入失敗：' + e.message;
    errBox.style.display = 'block';
  }
};

document.getElementById('logoutBtn').onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  const errBox = document.getElementById('loginError');
  if (user && user.email === TEACHER_EMAIL && user.emailVerified) {
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('dashboard').hidden = false;
    errBox.style.display = 'none';
    startListening();
  } else if (user) {
    errBox.textContent = `登入帳號 ${user.email} 不是老師（限 ${TEACHER_EMAIL}）。請登出後重新登入。`;
    errBox.style.display = 'block';
  } else {
    document.getElementById('userEmail').textContent = '未登入';
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('dashboard').hidden = true;
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  }
});

function startListening() {
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(collection(db, COLLECTION_NAME), (snap) => {
    allEvents = [];
    snap.forEach((doc) => {
      allEvents.push({ id: doc.id, ...doc.data() });
    });
    refreshChapterOptions();
    render();
  }, (error) => {
    console.error('Firestore subscribe error:', error);
    const errBox = document.getElementById('loginError');
    errBox.textContent = '讀取失敗：' + error.message;
    errBox.style.display = 'block';
  });
}

// 動態填章節下拉
function refreshChapterOptions() {
  const sel = document.getElementById('chapterFilter');
  const currentVal = sel.value;
  const chapters = new Set();
  allEvents.forEach(e => { if (e.chapter) chapters.add(e.chapter); });
  sel.innerHTML = '<option value="">全部章節</option>' +
    [...chapters].sort().map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = currentVal;
}

// 篩選邏輯
function getFilteredEvents() {
  const course = document.getElementById('courseFilter').value;
  const cls = document.getElementById('classFilter').value;
  const chapter = document.getElementById('chapterFilter').value;
  const date = document.getElementById('dateFilter').value;
  const now = Date.now();
  return allEvents.filter(e => {
    if (course && e.course_id !== course) return false;
    if (cls && e.class_id !== cls) return false;
    if (chapter && e.chapter !== chapter) return false;
    if (date && e.timestamp && e.timestamp.toDate) {
      const t = e.timestamp.toDate().getTime();
      if (date === 'today') {
        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        if (t < todayStart.getTime()) return false;
      } else if (date === '3d') {
        if (now - t > 3 * 86400 * 1000) return false;
      } else if (date === '7d') {
        if (now - t > 7 * 86400 * 1000) return false;
      }
    }
    return true;
  });
}

['courseFilter', 'classFilter', 'chapterFilter', 'dateFilter'].forEach(id => {
  document.getElementById(id).addEventListener('change', render);
});

function render() {
  const events = getFilteredEvents();
  const students = new Set(events.map(e => e.student_id));
  const answers = events.filter(e => e.event_type === 'answer');
  const completes = events.filter(e => e.event_type === 'session_complete');
  const correctCount = answers.filter(e => e.is_correct === true).length;
  const accuracy = answers.length > 0
    ? Math.round((correctCount / answers.length) * 100) + '%'
    : '—';
  document.getElementById('kpiStudents').textContent = students.size;
  document.getElementById('kpiAnswers').textContent = answers.length;
  document.getElementById('kpiCompletes').textContent = completes.length;
  document.getElementById('kpiAccuracy').textContent = accuracy;

  renderCompletion(events, students, completes);
  renderErrorRank(answers);
  renderFeed(events);
}

function renderCompletion(events, students, completes) {
  // 偵測本次篩選下出現的遊戲名稱
  const games = new Set();
  events.forEach(e => { if (e.game) games.add(e.game); });
  const gameList = [...games].sort();

  // 更新表頭
  const header = document.getElementById('completionHeader');
  header.innerHTML = '<th>學號</th><th>課程</th>' +
    gameList.map(g => `<th>${GAME_NAMES[g] || g}</th>`).join('');

  // 學號 -> { course_id, games: {game: best_score} }
  const matrix = {};
  events.forEach(e => {
    if (!matrix[e.student_id]) {
      matrix[e.student_id] = { course: e.course_id, games: {} };
    }
    if (e.event_type === 'session_complete' && e.game) {
      const prev = matrix[e.student_id].games[e.game];
      const curScore = e.final_score || 0;
      if (prev === undefined || curScore > prev) {
        matrix[e.student_id].games[e.game] = curScore;
      }
    }
  });

  const tbody = document.getElementById('completionBody');
  tbody.innerHTML = '';
  if (students.size === 0) {
    const span = gameList.length + 2;
    tbody.innerHTML = `<tr><td colspan="${span}" class="panel-empty">尚無學生作答</td></tr>`;
    return;
  }
  const sortedSids = [...students].sort();
  sortedSids.forEach(sid => {
    const rec = matrix[sid] || { course: '?', games: {} };
    const tr = document.createElement('tr');
    const courseBadge = `<span class="course-badge ${COURSE_BADGE_CLS[rec.course] || ''}">${COURSE_NAMES[rec.course] || rec.course}</span>`;
    tr.innerHTML = `<td class="cell-sid">${sid}</td><td>${courseBadge}</td>` +
      gameList.map(g => {
        const score = rec.games[g];
        if (score === undefined) return '<td class="cell-empty">—</td>';
        return `<td class="cell-done">✓ ${score}</td>`;
      }).join('');
    tbody.appendChild(tr);
  });
}

function renderErrorRank(answers) {
  const wrong = answers.filter(e => e.is_correct === false);
  const errCount = {};
  wrong.forEach(e => {
    const key = `${e.game || '?'} · ${e.question_id || '?'}`;
    errCount[key] = (errCount[key] || 0) + 1;
  });
  const sorted = Object.entries(errCount).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const max = sorted.length ? sorted[0][1] : 1;
  const div = document.getElementById('errorRank');
  if (!sorted.length) {
    div.innerHTML = '<div class="panel-empty">尚無錯誤資料</div>';
    return;
  }
  div.innerHTML = sorted.map(([term, n]) => `
    <div class="bar-row">
      <div class="term">${escapeHtml(term)}</div>
      <div class="bar"><div class="bar-fill" style="width: ${(n / max * 100).toFixed(0)}%"></div></div>
      <div class="count">${n} 次</div>
    </div>
  `).join('');
}

function renderFeed(events) {
  const sorted = [...events]
    .filter(e => e.timestamp)
    .sort((a, b) => (b.timestamp.seconds || 0) - (a.timestamp.seconds || 0))
    .slice(0, 30);
  const div = document.getElementById('liveFeed');
  if (!sorted.length) {
    div.innerHTML = '<div class="panel-empty">等待學生開始作答…</div>';
    return;
  }
  div.innerHTML = sorted.map(e => {
    const t = e.timestamp.toDate ? e.timestamp.toDate() : new Date();
    const time = t.toLocaleTimeString('zh-TW', { hour12: false });
    let what = '';
    const courseBadge = `<span class="course-badge ${COURSE_BADGE_CLS[e.course_id] || ''}">${COURSE_NAMES[e.course_id] || e.course_id || ''}</span>`;
    const game = GAME_NAMES[e.game] || e.game || '';
    if (e.event_type === 'answer') {
      const tag = e.is_correct
        ? '<span class="tag tag-correct">✓對</span>'
        : '<span class="tag tag-wrong">✗錯</span>';
      what = `${tag} ${courseBadge} ${escapeHtml(game)} <span style="color:var(--muted)">→</span> ${escapeHtml(e.question_id || '')}`;
    } else if (e.event_type === 'session_complete') {
      what = `<span class="tag tag-complete">🏁完成</span> ${courseBadge} ${escapeHtml(game)} 得分 <strong>${e.final_score}</strong>`;
    } else {
      what = `${courseBadge} ${escapeHtml(e.event_type)} · ${escapeHtml(game)}`;
    }
    return `<div class="feed-item">
      <span class="time">${time}</span>
      <span class="who">${escapeHtml(e.student_id)}</span>
      <span class="what">${what}</span>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

document.getElementById('exportBtn').onclick = () => {
  const events = getFilteredEvents();
  if (!events.length) {
    alert('沒有資料可匯出。');
    return;
  }
  const headers = ['student_id', 'course_id', 'class_id', 'chapter', 'game',
                   'event_type', 'question_id', 'is_correct', 'attempts', 'final_score', 'timestamp'];
  const lines = [headers.join(',')];
  events.forEach(e => {
    const t = e.timestamp && e.timestamp.toDate ? e.timestamp.toDate().toISOString() : '';
    const row = headers.map(h => {
      const v = h === 'timestamp' ? t : e[h];
      if (v === undefined || v === null) return '';
      const s = String(v).replace(/"/g, '""');
      return /[",\n]/.test(s) ? `"${s}"` : s;
    });
    lines.push(row.join(','));
  });
  const csv = '﻿' + lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `student_events_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};
</script>
</body>
</html>
